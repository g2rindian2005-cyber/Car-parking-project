name: Car Parking CI-CD

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: car-parking-eks

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: jawandockerhub
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Image
        run: |
          docker build -t jawandockerhub/carparking-frontend:latest ./docker-project/frontend

      - name: Build Backend Image
        run: |
          docker build -t jawandockerhub/carparking-backend:latest ./docker-project/backend

      - name: Push Frontend Image
        run: docker push jawandockerhub/carparking-frontend:latest

      - name: Push Backend Image
        run: docker push jawandockerhub/carparking-backend:latest

      - name: Install eksctl
        run: |
          curl -sLO https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz
          tar -xzf eksctl_Linux_amd64.tar.gz
          sudo mv eksctl /usr/local/bin

      - name: Check/Create EKS Cluster
        run: |
          if eksctl get cluster --region $AWS_REGION | grep $CLUSTER_NAME
          then
            echo "Cluster already exists"
          else
            eksctl create cluster \
              --name $CLUSTER_NAME \
              --region $AWS_REGION \
              --nodes 2
          fi

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      - name: Verify Cluster
        run: |
          kubectl get nodes

      - name: Deploy Application
        run: |
          kubectl apply -f docker-project/k8s/

      - name: Verify Deployment
        run: |
          kubectl get deployments
          kubectl get pods
          kubectl get svc
