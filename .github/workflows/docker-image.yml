name: CI-CD to EKS

on:
  push:
    branches:
      - main

env:
  DOCKER_USER: jawandockerhub

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: jawandockerhub
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Image
        run: |
          docker build -t jawandockerhub/carparking-frontend:latest ./docker-project/frontend

      - name: Build Backend Image
        run: |
          docker build -t jawandockerhub/carparking-backend:latest ./docker-project/backend

      - name: Push Frontend Image
        run: docker push jawandockerhub/carparking-frontend:latest

      - name: Push Backend Image
        run: docker push jawandockerhub/carparking-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
          --region ${{ secrets.AWS_REGION }} \
          --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/

          kubectl rollout restart deployment/frontend
          kubectl rollout restart deployment/backend

          kubectl rollout status deployment/frontend
          kubectl rollout status deployment/backend
